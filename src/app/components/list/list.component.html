<section class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold text-white md:text-4xl">Listado completo</h1>
    <p class="mt-2 text-slate-400">{{ total }} Pokémon en la Pokédex</p>
  </div>

  <div class="flex flex-wrap items-center justify-center gap-4 rounded-2xl border border-white/10 bg-white/5 p-4 backdrop-blur">
    <button
      (click)="anterior()"
      [disabled]="desde == 0"
      class="rounded-lg bg-slate-700 px-4 py-2 font-medium transition hover:bg-slate-600 disabled:cursor-not-allowed disabled:opacity-40"
    >
      ← Anterior
    </button>
    <span class="min-w-[120px] text-center font-semibold text-yellow-400">
      Página {{ (desde / 20) + 1 }}
    </span>
    <button
      (click)="siguiente()"
      [disabled]="desde + 20 >= total"
      class="rounded-lg bg-slate-700 px-4 py-2 font-medium transition hover:bg-slate-600 disabled:cursor-not-allowed disabled:opacity-40"
    >
      Siguiente →
    </button>
  </div>

  @if (lista.length === 0) {
    <p class="py-12 text-center text-slate-400 animate-pulse">Cargando listado...</p>
  } @else {
    <ul class="grid gap-2 sm:grid-cols-2">
      @for (p of lista; track p.name) {
        <li
          class="flex items-center justify-between rounded-xl border border-white/10 bg-white/5 px-4 py-3 capitalize backdrop-blur transition hover:border-white/20 hover:bg-white/10"
        >
          <span class="font-medium text-white">{{ p.name }}</span>
          <a
            [routerLink]="['/pokemon', p.name]"
            class="text-sm font-semibold text-red-400 transition hover:text-red-300"
          >
            Ver más →
          </a>
        </li>
      }
    </ul>
  }
</section>
