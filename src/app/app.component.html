<div class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 text-slate-100">
  <header class="border-b border-white/10 bg-black/20 backdrop-blur-md">
    <nav class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4">
      <a routerLink="/dashboard" class="text-xl font-bold tracking-tight">
        <span class="text-red-500">Poké</span><span class="text-yellow-400">dex</span>
      </a>
      <div class="flex gap-2">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-red-500 text-white shadow-lg shadow-red-500/30"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full px-4 py-2 text-sm font-medium text-slate-300 transition hover:bg-white/10"
        >
          Inicio
        </a>
        <a
          routerLink="/listado"
          routerLinkActive="bg-red-500 text-white shadow-lg shadow-red-500/30"
          class="rounded-full px-4 py-2 text-sm font-medium text-slate-300 transition hover:bg-white/10"
        >
          Listado
        </a>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <router-outlet></router-outlet>
  </main>
</div>
